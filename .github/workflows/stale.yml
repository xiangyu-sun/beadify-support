name: Mark stale issues
on:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been waiting on additional information for 30 days.
            If the problem is still occurring, please reply with the requested details
            and it will be re-opened for investigation.
          close-issue-message: >
            Closing due to inactivity. If this is still an issue, please open a new report.
          days-before-stale: 30
          days-before-close: 14
          stale-issue-label: needs-info
          only-labels: needs-info
